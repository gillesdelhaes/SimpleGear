<!DOCTYPE html>
<html lang="en" data-theme="dark" data-app="gear">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SimpleGear</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fonts (Onest + JetBrains Mono) load via glasshouse.css @import -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script>
      // Restore persisted theme before first paint to avoid a flash.
      // ?theme=light|dark overrides for previews without touching the saved choice.
      const param = new URLSearchParams(location.search).get('theme')
      document.documentElement.dataset.theme =
        param === 'light' || param === 'dark'
          ? param
          : localStorage.getItem('sg-theme') === 'light' ? 'light' : 'dark'
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
